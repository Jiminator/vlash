# VLASH Inference Configuration for PI05 (Synchronous, no overlap)

# Robot configuration
robot:
  type: so101_follower
  port: /dev/ttyACM0
  id: so101_follower
  cameras:
    front:
      type: opencv
      index_or_path: /dev/video2
      width: 1280
      height: 720
      fps: 30

# Policy configuration
policy:
# Fill in the path to the policy checkpoint
  path: Jiminator/vlash_sync_pi05_test_wood_black_random_50
  n_action_steps: 32
  compile_model: true
  device: cuda
  fuse_qkv: true
  fuse_gate_up: true

# Task description passed to the policy
single_task: "Pick up white and cyan cube and put in wooden crate"

# Control parameters
fps: 30  # Control loop frequency (Hz)
control_time_s: 600  # Total runtime (seconds)

# Visualization
display_data: true  # Camera feeds via rerun
play_sounds: true  # Audio feedback

# Action quantization factor
action_quant_ratio: 1

# Synchronous mode: no overlap between chunks
inference_overlap_steps: 0
