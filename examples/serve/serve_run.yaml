# VLASH Inference Server Configuration for PI05

# Policy configuration
policy:
# Fill in the path to the policy checkpoint
  path: Jiminator/vlash_sync_pi05_test_wood_black_random_50
  n_action_steps: 32  # Actions executed per inference
  compile_model: true
  device: cuda
  fuse_qkv: true
  fuse_gate_up: true

# Server configuration
port: 8080
max_workers: 4
max_message_size: 4194304  # 4 MB
